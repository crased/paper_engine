# Configuration file for training_model.py
# Paper Engine - YOLO model training settings

[Directories]
# Dataset directories
dataset_dir = yolo_dataset
dataset_yaml = dataset_gameplay.yaml
screenshots_dir = screenshots
output_dir = yolo_dataset

[Dataset]
# Dataset split (0.0 to 1.0)
train_split = 0.8

[Model]
# YOLO model settings
# Options: yolo11n.pt, yolo11s.pt, yolo11m.pt, yolo11l.pt, yolo11x.pt, yolo26n.pt, yolo26s.pt
# YOLO26s: 10M params, 22.8 GFLOPs — 4x step up from nano, sweet spot for ~3K image dataset
model_name = yolo26s.pt

[Training]
# Training hyperparameters
epochs = 150
img_size = 960
# -1 = auto-batch: ultralytics probes VRAM and picks the largest batch that fits
batch_size = -1
patience = 20
# Nominal batch size for gradient accumulation (effective batch = nbs regardless of actual batch)
nbs = 64

[TrainingOptions]
# Training options
save_checkpoints = true
generate_plots = true
verbose = true
# Dataloader worker processes (each uses memory; lower = less RAM)
workers = 4
# Dataset caching: false = read from disk, disk = cache to SSD, ram = cache in memory
# WARNING: ram caching loads the entire dataset into memory — avoid with large datasets
cache = false

[Export]
# Model export settings
# Available formats: torchscript, onnx, tensorrt, pytorch, pt
# Note: TensorRT requires NVIDIA GPU and proper drivers
export_formats = torchscript

[Output]
# Output settings
model_output_name = paper_engine_yolo26s
# Fallback path; test_model.py auto-detects the newest model in bot_logic/models/
best_model_path = bot_logic/models/paper_engine_yolo26s/weights/best.pt

[Optimizer]
# Advanced training settings
optimizer = auto
learning_rate = 0.01
momentum = 0.937
weight_decay = 0.0005
# Cosine annealing LR schedule — smoother convergence than linear decay
cos_lr = true
# Mixed precision (FP16/BF16) — halves memory per activation, enables larger batches
amp = true

[Augmentation]
# Data augmentation settings
hsv_h = 0.015
hsv_s = 0.7
hsv_v = 0.4
degrees = 5.0
translate = 0.1
scale = 0.3
shear = 0.0
perspective = 0.0
flipud = 0.0
fliplr = 0.5
mosaic = 0.5
mixup = 0.05
erasing = 0.15
close_mosaic = 10
