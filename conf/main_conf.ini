[Game]
game_path = game/
wine_desktop_resolution = 1920x1080

[Screenshot]
screenshot_interval = 3
game_initialization_wait = 10

[UserInteraction]
default_launch_game = true
prompt_user_for_game_launch = true

[System]
auto_create_directories = true


[Monitor]
default_monitor = 0

[LLM]
llm_provider = anthropic
llm_model = claude-sonnet-4-20250514
max_tokens_search = 4096

[CloudStorage]
provider = none

